<script>
(function () {
    // Design-ui pages are single compositions, so the whole body is editable.
    function markEditable() {
        document.body.classList.add('artifact-editable');
    }

    // Credit badge with idle-fade. Hover devices only.
    function initChromeUI() {
        if (!matchMedia('(hover: hover)').matches) return;

        var credit = document.createElement('div');
        credit.className = 'design-ui-credit';
        credit.setAttribute('aria-hidden', 'true');
        credit.innerHTML = '\u{1F49C} by ClickUp Brain';
        document.body.appendChild(credit);

        var timer = null;
        var fade = function (out) { credit.style.opacity = out ? '0' : ''; };
        fade(true);
        var show = function () {
            fade(false);
            clearTimeout(timer);
            timer = setTimeout(function () { fade(true); }, 3000);
        };
        document.addEventListener('mousemove', show);
        show();
    }

    function init() {
        markEditable();
        initChromeUI();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();

</script>

/* ---------- layout ---------- */
const COLX = [30, 215, 460, 725, 985];
const ROW_H = 26, TOP = 36;
let yCursor = TOP;

function hasKids(n){ return n.c && n.c.length; }
function idFromHref(h){
  if(!h) return '';
  const file = h.split('/').pop() || '';
  return decodeURIComponent(file).replace(/\.html?$/i,'');
}
function layout(n, depth){
  n._x = COLX[Math.min(depth, COLX.length-1)];
  if(hasKids(n)){
    n.c.forEach(ch => layout(ch, depth+1));
    n._y = (n.c[0]._y + n.c[n.c.length-1]._y)/2;
  } else {
    n._y = yCursor; yCursor += ROW_H;
  }
}
const root = { n:"DSA Patterns", c:PATTERNS };
PATTERNS.forEach((p,i)=>p._color = COLORS[i % COLORS.length]);
layout(root, 0);
const VBH = yCursor + 30;
const VBW = 1380;

/* ---------- render ---------- */
const NS="http://www.w3.org/2000/svg";
const svg = document.getElementById('mapSvg');
svg.setAttribute('viewBox', `0 0 ${VBW} ${VBH}`);
let scale = 1;
function applyScale(){ svg.setAttribute('width', VBW*scale); svg.setAttribute('height', VBH*scale); }

const curveLayer = document.createElementNS(NS,'g');
const nodeLayer  = document.createElementNS(NS,'g');
svg.appendChild(curveLayer); svg.appendChild(nodeLayer);

function estW(txt, role){
  const cw = role==='pattern'?8.8 : role==='sub'?7.0 : 6.7;
  return txt.length*cw;
}
function drawCurve(x1,y1,x2,y2,color,w){
  const dx = Math.max(26,(x2-x1)*0.5);
  const p=document.createElementNS(NS,'path');
  p.setAttribute('d',`M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`);
  p.setAttribute('fill','none');
  p.setAttribute('stroke',color);
  p.setAttribute('stroke-width',w);
  p.setAttribute('stroke-linecap','round');
  p.setAttribute('opacity','.9');
  curveLayer.appendChild(p);
}
function txt(x,y,cls,content,anchor,fill){
  const t=document.createElementNS(NS,'text');
  t.setAttribute('x',x); t.setAttribute('y',y); t.setAttribute('class',cls);
  if(anchor) t.setAttribute('text-anchor',anchor);
  if(fill) t.setAttribute('fill',fill);
  t.setAttribute('dominant-baseline','middle');
  t.textContent=content;
  return t;
}
function badge(x,y,count,color){
  const g=document.createElementNS(NS,'g');
  const w=13+(''+count).length*6;
  const r=document.createElementNS(NS,'rect');
  r.setAttribute('x',x); r.setAttribute('y',y-8); r.setAttribute('width',w); r.setAttribute('height',16);
  r.setAttribute('rx',8); r.setAttribute('fill',color);
  g.appendChild(r); g.appendChild(txt(x+w/2,y+1,'bcount',count,'middle'));
  return {g,w};
}
function dot(x,y,color){
  const c=document.createElementNS(NS,'circle');
  c.setAttribute('cx',x); c.setAttribute('cy',y); c.setAttribute('r',3.2); c.setAttribute('fill',color);
  return c;
}

/* root pill */
(function(){
  const rw=156, rh=44, rx=18, ry=root._y-rh/2;
  const r=document.createElementNS(NS,'rect');
  r.setAttribute('x',rx); r.setAttribute('y',ry); r.setAttribute('width',rw); r.setAttribute('height',rh);
  r.setAttribute('rx',12); r.setAttribute('fill','var(--surface)'); r.setAttribute('stroke','var(--border2)'); r.setAttribute('stroke-width','1.5');
  nodeLayer.appendChild(r);
  nodeLayer.appendChild(txt(rx+rw/2, root._y, 'rootname','DSA Patterns','middle'));
  root._rx = rx+rw;
})();

function render(node, depth, parentRX, parentY, color, strokeW){
  drawCurve(parentRX, parentY, node._x-8, node._y, color, strokeW);
  const kids = hasKids(node);
  let outX;
  if(depth===1){
    nodeLayer.appendChild(txt(node._x, node._y, 'pname', node.n, 'start', color));
    outX = node._x + estW(node.n,'pattern') + 10;
  } else if(kids){
    nodeLayer.appendChild(txt(node._x, node._y, 'sname', node.n, 'start'));
    outX = node._x + estW(node.n,'sub') + 9;
  } else {
    const soon = node.soon, dup = node.d;
    const dcolor = soon ? '#5c6189' : dup ? '#fbbf24' : color;
    if(soon){
      const g=document.createElementNS(NS,'g'); g.setAttribute('opacity','.55');
      g.appendChild(dot(node._x,node._y,dcolor));
      g.appendChild(txt(node._x+12,node._y,'lname',node.n,'start'));
      g.appendChild(txt(node._x+16+estW(node.n,'leaf'),node._y,'soontag','soon','start'));
      nodeLayer.appendChild(g);
    } else {
      const a=document.createElementNS(NS,'a');
      a.setAttribute('href',node.h); a.setAttribute('target','_blank'); a.setAttribute('rel','noopener');
      a.setAttribute('class','leaf-hit'); a.setAttribute('data-name',node.n.toLowerCase());
      a.setAttribute('data-id', idFromHref(node.h));
      const nameW=estW(node.n,'leaf');
      const hit=document.createElementNS(NS,'rect');
      hit.setAttribute('x',node._x-4); hit.setAttribute('y',node._y-10);
      hit.setAttribute('width',nameW+(dup?46:22)); hit.setAttribute('height',20); hit.setAttribute('fill','transparent');
      a.appendChild(hit);
      a.appendChild(dot(node._x,node._y,dcolor));
      a.appendChild(txt(node._x+12,node._y,'lname',node.n,'start'));
      const ul=document.createElementNS(NS,'rect');
      ul.setAttribute('x',node._x+12); ul.setAttribute('y',node._y+8); ul.setAttribute('width',nameW); ul.setAttribute('height',1.3);
      ul.setAttribute('fill',color); ul.setAttribute('class','leaf-ul');
      a.appendChild(ul);
      if(dup) a.appendChild(txt(node._x+17+nameW,node._y,'duptag','dup','start'));
      const ti=document.createElementNS(NS,'title'); ti.textContent=decodeURIComponent(node.h); a.appendChild(ti);
      nodeLayer.appendChild(a);
    }
    return;
  }
  if(node.b){ const bd=badge(outX,node._y,node.b,color); nodeLayer.appendChild(bd.g); outX+=bd.w+6; }
  const nextW = depth===1 ? 2.2 : depth===2 ? 1.9 : 1.6;
  node.c.forEach(ch => render(ch, depth+1, outX, node._y, color, nextW));
}

PATTERNS.forEach(p => render(p, 1, root._rx, root._y, p._color, 2.6));
applyScale();

/* zoom */
document.getElementById('zin').onclick =()=>{ scale=Math.min(2,scale+0.15); applyScale(); };
document.getElementById('zout').onclick=()=>{ scale=Math.max(0.4,scale-0.15); applyScale(); };
document.getElementById('zfit').onclick=()=>{ scale=1; applyScale(); document.getElementById('canvas').scrollTo({top:0,left:0,behavior:'smooth'}); };

/* drag to pan */
const canvas=document.getElementById('canvas');
let down=false,sx,sy,sl,st;
canvas.addEventListener('mousedown',e=>{ if(e.target.closest('a'))return; down=true; canvas.classList.add('grabbing'); sx=e.clientX; sy=e.clientY; sl=canvas.scrollLeft; st=canvas.scrollTop; });
window.addEventListener('mouseup',()=>{ down=false; canvas.classList.remove('grabbing'); });
window.addEventListener('mousemove',e=>{ if(!down)return; canvas.scrollLeft=sl-(e.clientX-sx); canvas.scrollTop=st-(e.clientY-sy); });

/* search highlight */
const search=document.getElementById('search');
search.addEventListener('input',()=>{
  const q=search.value.trim().toLowerCase();
  svg.querySelectorAll('.leaf-hit').forEach(a=>{
    const n=a.getAttribute('data-name')||'';
    if(!q){ a.classList.remove('dim'); return; }
    a.classList.toggle('dim', !n.includes(q));
  });
});

  const promoActive = () => typeof window.isAlgocruxPromoActive === 'function' && window.isAlgocruxPromoActive();
  let isSubscribed = false;
  let isSignedIn = false;

  function applyLocks() {
    document.querySelectorAll('.leaf-hit').forEach(a => {
      const id = a.getAttribute('data-id') || '';
      const locked = !FREE_IDS.has(id) && !isSubscribed && !promoActive();
      a.classList.toggle('locked', locked);

  onAuthStateChanged(auth, async (user) => {
    isSignedIn = !!user;
    if (!user) { isSubscribed = false; applyLocks(); return; }
    try {
      const snap = await getDoc(doc(db, 'users', user.uid));
      const data = snap.exists() ? snap.data() : null;
      isSubscribed = !!(data && data.subscriptionActive && data.subscriptionExpiry > Date.now());
    } catch (e) {
      console.error('chart.html: subscription check failed', e);
      isSubscribed = false;
    }
    applyLocks();
  });

  document.getElementById('mapSvg').addEventListener('click', (e) => {
